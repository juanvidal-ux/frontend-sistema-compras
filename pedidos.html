<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Pedidos | Sistema de Compras</title>
    
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="loader.css"> <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>

    <div id="menu-placeholder"></div>

    <div class="container">
        <h1><i class="fa-solid fa-list-check"></i> Lista de Pedidos de Compra</h1>

        <div class="toolbar" style="background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 20px; display: flex; flex-wrap: wrap; gap: 15px; justify-content: space-between; align-items: center;">
            
            <div class="search-wrapper" style="flex: 1; min-width: 300px; position: relative;">
                <i class="fa-solid fa-magnifying-glass" style="position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #94a3b8;"></i>
                <input type="text" id="input-busca" placeholder="Pesquisar por PCN, Fornecedor ou Item..." 
                       style="width: 100%; padding: 12px 12px 12px 40px; border-radius: 8px; border: 1px solid #cbd5e1; font-size: 15px;">
            </div>

            <button id="btn-exportar-geral" class="btn-success" style="display: none; align-items: center; gap: 8px; padding: 10px 20px;">
                <i class="fa-solid fa-file-excel"></i> Exportar Relatório (Excel)
            </button>
        </div>

        <div class="table-responsive" style="background: #fff; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.05);">
            <table class="table-pedidos" style="width: 100%; border-collapse: collapse;">
                <thead style="background-color: #1e293b; color: #fff;">
                    <tr>
                        <th style="padding: 15px;">PCN</th>
                        <th style="padding: 15px;">Emissão</th>
                        <th style="padding: 15px;">Responsável</th>
                        <th style="padding: 15px;">Tipo Compra</th>
                        <th style="padding: 15px;">Fornecedor</th>
                        <th style="padding: 15px;">Valor Total</th>
                        <th style="padding: 15px; text-align: center;">Ações</th>
                    </tr>
                </thead>
                <tbody id="corpo-tabela-pedidos">
                    </tbody>
            </table>
        </div>

        <div id="paginacao-container" style="display: flex; justify-content: center; align-items: center; gap: 20px; margin-top: 25px;">
            
            <button id="btn-pag-anterior" class="btn-secondary" style="display: flex; align-items: center; gap: 5px;" disabled>
                <i class="fa-solid fa-chevron-left"></i> Anterior
            </button>
            
            <span id="info-paginacao" style="font-weight: 600; color: #475569; background: #e2e8f0; padding: 8px 16px; border-radius: 20px;">
                Página 1
            </span>
            
            <button id="btn-pag-proximo" class="btn-secondary" style="display: flex; align-items: center; gap: 5px;">
                Próximo <i class="fa-solid fa-chevron-right"></i>
            </button>

        </div>
    </div>

    <script src="loader.js"></script> <script src="auth.js"></script>   <script src="menu.js"></script>   <script src="pedidos.js"></script> </body>
</html>
